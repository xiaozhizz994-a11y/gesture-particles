<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>都成视觉 - 稳定交付版</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm/vision_bundle.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker/face_landmarker.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        #input_video { position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
        #start_btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 18px 45px; font-size: 18px; background: #0ff; border: none;
            border-radius: 50px; color: #000; font-weight: bold; z-index: 10001;
            cursor: pointer; box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            transition: all 0.3s;
        }
        #footer_text {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: #fff; font-size: 24px; font-weight: 900; letter-spacing: 4px;
            pointer-events: none; text-align: center; z-index: 100;
        }
    </style>
</head>
<body>

<video id="input_video" playsinline webkit-playsinline muted></video>
<canvas id="canvas"></canvas>
<button id="start_btn">开启交互体验</button>
<div id="footer_text">都成视觉</div>

<script>
    /** --- 1. 全局配置与变量 --- **/
    let audioCtx, analyser, dataArray, bgmSource, audioBoost = 0;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('start_btn');
    const videoElement = document.getElementById('input_video');

    let width, height, particles = [];
    let dynamicFaceCoords = [];
    let faceLandmarker;

    // 获取模型绝对路径，带上随机后缀彻底解决缓存
    const getModelUrl = () => {
        const baseUrl = window.location.href.split('?')[0].split('#')[0];
        const dir = baseUrl.substring(0, baseUrl.lastIndexOf("/") + 1);
        return `${dir}face_landmarker.task?v=${Date.now()}`;
    };

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        if (particles.length === 0) {
            for (let i = 0; i < 468; i++) {
                particles.push({
                    id: i, x: Math.random() * width, y: Math.random() * height,
                    size: Math.random() * 2 + 1
                });
            }
        }
    }
    window.addEventListener('resize', resize);

    /** --- 2. 核心初始化 --- **/
    async function initFaceLandmarker() {
        // 确保 window.mediapipe 已被脚本加载
        if (!window.mediapipe || !window.mediapipe.tasksVision) {
            throw new Error("MediaPipe 库尚未加载完成，请刷新页面重试。");
        }

        const vision = await window.mediapipe.tasksVision.FilesetResolver.forVisionTasks(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
        );
        
        const modelPath = getModelUrl();
        console.log("模型加载路径:", modelPath);

        faceLandmarker = await window.mediapipe.tasksVision.FaceLandmarker.createFromOptions(vision, {
            baseOptions: {
                modelAssetPath: modelPath, 
                delegate: "GPU"
            },
            runningMode: "VIDEO",
            numFaces: 1
        });

        // 二次确认关键方法是否存在
        if (!faceLandmarker || typeof faceLandmarker.detectForVideo !== 'function') {
            throw new Error("模型初始化异常：方法未绑定。请确认 face_landmarker.task 文件名完全正确且未损坏。");
        }
    }

    async function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const res = await fetch('music.MP3');
        if (!res.ok) throw new Error("音频资源加载失败，请检查 music.MP3 是否在根目录。");
        const buffer = await audioCtx.decodeAudioData(await res.arrayBuffer());
        bgmSource = audioCtx.createBufferSource();
        bgmSource.buffer = buffer;
        bgmSource.loop = true;
        analyser = audioCtx.createAnalyser();
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        bgmSource.connect(analyser);
        analyser.connect(audioCtx.destination);
        bgmSource.start(0);
    }

    /** --- 3. 循环逻辑 --- **/
    function animate() {
        if (analyser) {
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < 128; i++) sum += dataArray[i]; // 取低频部分更有节奏感
            audioBoost = sum / 128 / 255;
        }
        
        ctx.fillStyle = `rgba(0, 0, 0, 0.23)`;
        ctx.fillRect(0, 0, width, height);

        particles.forEach(p => {
            if (dynamicFaceCoords.length > 0) {
                const target = dynamicFaceCoords[p.id % dynamicFaceCoords.length];
                p.x += (target.x - p.x) * (0.08 + audioBoost * 0.12);
                p.y += (target.y - p.y) * (0.08 + audioBoost * 0.12);
            } else {
                p.x += Math.sin(Date.now() * 0.001 + p.id) * 0.4;
                p.y += Math.cos(Date.now() * 0.001 + p.id) * 0.4;
            }
            ctx.fillStyle = `hsla(${190 + audioBoost * 110}, 100%, 75%, 0.8)`;
            const s = p.size * (1 + audioBoost * 2.8);
            ctx.fillRect(p.x, p.y, s, s);
        });
        requestAnimationFrame(animate);
    }

    function predict() {
        if (faceLandmarker && videoElement.readyState >= 2) {
            try {
                const results = faceLandmarker.detectForVideo(videoElement, performance.now());
                if (results.faceLandmarks && results.faceLandmarks[0]) {
                    dynamicFaceCoords = results.faceLandmarks[0].map(m => ({
                        x: (1 - m.x) * width, y: m.y * height
                    }));
                }
            } catch (e) {
                console.error("帧处理失败:", e);
            }
        }
        requestAnimationFrame(predict);
    }

    /** --- 4. 启动按钮逻辑 --- **/
    startBtn.onclick = async () => {
        startBtn.innerText = "系统唤醒中...";
        startBtn.style.pointerEvents = "none";
        
        try {
            // 先尝试初始化音频和视觉
            await initAudio();
            await initFaceLandmarker();
            
            // 初始化相机
            const camera = new Camera(videoElement, {
                onFrame: async () => {},
                width: 640, height: 480
            });
            await camera.start();
            
            startBtn.style.display = 'none';
            predict();
        } catch (e) {
            console.error(e);
            alert(`初始化失败：\n${e.message}\n\n排查建议：\n1. 检查 GitHub 上文件名是否为 face_landmarker.task (无后缀)\n2. 确保在 Safari 打开而非微信内。`);
            startBtn.innerText = "重新尝试";
            startBtn.style.pointerEvents = "all";
        }
    };

    resize();
    animate();
</script>
</body>
</html>

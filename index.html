<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>都成视觉 - 稳定交付版</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm/vision_bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker/face_landmarker.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        #input_video { position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
        #start_btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 18px 45px; font-size: 18px; background: #0ff; border: none;
            border-radius: 50px; color: #000; font-weight: bold; z-index: 10001;
            cursor: pointer; box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            transition: all 0.3s;
        }
        #footer_text {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: #fff; font-size: 24px; font-weight: 900; letter-spacing: 4px;
            pointer-events: none; text-align: center; z-index: 100;
        }
    </style>
</head>
<body>

<video id="input_video" playsinline webkit-playsinline muted></video>
<canvas id="canvas"></canvas>
<button id="start_btn">点击进入体验</button>
<div id="footer_text">都成视觉</div>

<script>
    let audioCtx, analyser, dataArray, bgmSource, audioBoost = 0;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('start_btn');
    const videoElement = document.getElementById('input_video');

    let width, height, particles = [];
    let dynamicFaceCoords = [];
    let faceLandmarker;

    // 获取当前网页的绝对根路径，解决 GitHub Pages 的路径偏移
    const getAbsoluteModelPath = () => {
        const loc = window.location;
        const root = loc.protocol + '//' + loc.host + loc.pathname.replace(/\/[^\/]*$/, '/');
        // 添加随机数 v=${Date.now()} 强制浏览器跳过缓存读取最新上传的文件
        return `${root}face_landmarker.task?v=${Date.now()}`;
    };

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        if (particles.length === 0) {
            for (let i = 0; i < 468; i++) {
                particles.push({
                    id: i, x: Math.random() * width, y: Math.random() * height,
                    vx: 0, vy: 0, size: Math.random() * 2 + 1
                });
            }
        }
    }
    window.addEventListener('resize', resize);

    async function initFaceLandmarker() {
        try {
            const vision = await window.mediapipe.tasksVision.FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
            );
            
            const modelUrl = getAbsoluteModelPath();
            console.log("正在尝试加载模型:", modelUrl);

            faceLandmarker = await window.mediapipe.tasksVision.FaceLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: modelUrl, 
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numFaces: 1
            });
        } catch (err) {
            console.error("模型初始化深度报错:", err);
            throw err;
        }
    }

    async function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const res = await fetch('music.MP3');
        if (!res.ok) throw new Error("音乐文件加载失败，请检查文件名大小写");
        const buffer = await audioCtx.decodeAudioData(await res.arrayBuffer());
        bgmSource = audioCtx.createBufferSource();
        bgmSource.buffer = buffer;
        bgmSource.loop = true;
        analyser = audioCtx.createAnalyser();
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        bgmSource.connect(analyser);
        analyser.connect(audioCtx.destination);
        bgmSource.start(0);
    }

    function animate() {
        if (analyser) {
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
            audioBoost = sum / dataArray.length / 255;
        }
        
        ctx.fillStyle = `rgba(0, 0, 0, 0.23)`;
        ctx.fillRect(0, 0, width, height);

        particles.forEach(p => {
            if (dynamicFaceCoords.length > 0) {
                const target = dynamicFaceCoords[p.id % dynamicFaceCoords.length];
                p.x += (target.x - p.x) * (0.08 + audioBoost * 0.12);
                p.y += (target.y - p.y) * (0.08 + audioBoost * 0.12);
            } else {
                p.x += Math.sin(Date.now() * 0.001 + p.id) * 0.4;
                p.y += Math.cos(Date.now() * 0.001 + p.id) * 0.4;
            }
            ctx.fillStyle = `hsla(${190 + audioBoost * 110}, 100%, 75%, 0.8)`;
            const s = p.size * (1 + audioBoost * 2.8);
            ctx.fillRect(p.x, p.y, s, s);
        });
        requestAnimationFrame(animate);
    }

    function predict() {
        if (faceLandmarker && videoElement.readyState >= 2) {
            const results = faceLandmarker.detectForVideo(videoElement, performance.now());
            if (results.faceLandmarks && results.faceLandmarks[0]) {
                dynamicFaceCoords = results.faceLandmarks[0].map(m => ({
                    x: (1 - m.x) * width, y: m.y * height
                }));
            }
        }
        requestAnimationFrame(predict);
    }

    startBtn.onclick = async () => {
        startBtn.innerText = "资源唤醒中...";
        startBtn.style.pointerEvents = "none";
        
        try {
            await initAudio();
            await initFaceLandmarker();
            
            // 明确指定使用前置摄像头
            const camera = new Camera(videoElement, {
                onFrame: async () => {},
                width: 640, height: 480,
                facingMode: 'user'
            });
            await camera.start();
            
            startBtn.style.display = 'none';
            predict();
        } catch (e) {
            console.error(e);
            alert(`初始化详情报错:\n${e.name}: ${e.message}\n\n排查建议：\n1. 确保在 Safari 浏览器中打开\n2. 确认 GitHub 根目录存在 face_landmarker.task\n3. 确认已允许摄像头权限`);
            startBtn.innerText = "点击重试";
            startBtn.style.pointerEvents = "all";
        }
    };

    resize();
    animate();
</script>
</body>
</html>

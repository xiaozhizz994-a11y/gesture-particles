<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>都成视觉 - 稳定修复版</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm/vision_bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker/face_landmarker.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        #input_video { position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
        #start_btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 18px 40px; font-size: 18px; background: #0ff; border: none;
            border-radius: 50px; color: #000; font-weight: bold; z-index: 10001;
            cursor: pointer; box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }
        #footer_text {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: #fff; font-size: 20px; letter-spacing: 4px; pointer-events: none;
        }
    </style>
</head>
<body>

<video id="input_video" playsinline webkit-playsinline muted></video>
<canvas id="canvas"></canvas>
<button id="start_btn">点击开启体验</button>
<div id="footer_text">都成视觉</div>

<script>
    let audioCtx, analyser, dataArray, bgmSource, audioBoost = 0;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('start_btn');
    const videoElement = document.getElementById('input_video');
    let width, height, particles = [], dynamicFaceCoords = [], faceLandmarker;

    // 1. 粒子引擎
    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        if (particles.length === 0) {
            for (let i = 0; i < 468; i++) particles.push({
                id: i, x: Math.random() * width, y: Math.random() * height,
                vx: 0, vy: 0, size: Math.random() * 2 + 1
            });
        }
    }
    window.addEventListener('resize', resize);

    function animate() {
        if (analyser) {
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
            audioBoost = sum / dataArray.length / 255;
        }
        ctx.fillStyle = `rgba(0, 0, 0, 0.2)`;
        ctx.fillRect(0, 0, width, height);
        
        particles.forEach(p => {
            if (dynamicFaceCoords.length > 0) {
                const t = dynamicFaceCoords[p.id % dynamicFaceCoords.length];
                p.x += (t.x - p.x) * (0.08 + audioBoost * 0.1);
                p.y += (t.y - p.y) * (0.08 + audioBoost * 0.1);
            } else {
                p.x += Math.sin(Date.now() * 0.001 + p.id) * 0.5;
                p.y += Math.cos(Date.now() * 0.001 + p.id) * 0.5;
            }
            ctx.fillStyle = `hsla(${190 + audioBoost * 100}, 100%, 70%, 0.8)`;
            ctx.fillRect(p.x, p.y, p.size * (1 + audioBoost * 2), p.size * (1 + audioBoost * 2));
        });
        requestAnimationFrame(animate);
    }

    // 2. 面部识别初始化
    async function initFaceLandmarker() {
        const vision = await window.mediapipe.tasksVision.FilesetResolver.forVisionTasks(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
        );
        faceLandmarker = await window.mediapipe.tasksVision.FaceLandmarker.createFromOptions(vision, {
            baseOptions: {
                modelAssetPath: "face_landmarker.task", // 必须确保 GitHub 根目录有此文件且无 .txt 后缀
                delegate: "GPU"
            },
            runningMode: "VIDEO",
            numFaces: 1
        });
    }

    function predict() {
        if (faceLandmarker && videoElement.readyState >= 2) {
            const results = faceLandmarker.detectForVideo(videoElement, performance.now());
            if (results.faceLandmarks && results.faceLandmarks[0]) {
                dynamicFaceCoords = results.faceLandmarks[0].map(m => ({
                    x: (1 - m.x) * width, y: m.y * height
                }));
            }
        }
        requestAnimationFrame(predict);
    }

    // 3. 启动逻辑
    startBtn.onclick = async () => {
        startBtn.innerText = "正在唤醒资源...";
        try {
            // 音频
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const res = await fetch('music.MP3');
            const buffer = await audioCtx.decodeAudioData(await res.arrayBuffer());
            bgmSource = audioCtx.createBufferSource();
            bgmSource.buffer = buffer;
            bgmSource.loop = true;
            analyser = audioCtx.createAnalyser();
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            bgmSource.connect(analyser);
            analyser.connect(audioCtx.destination);
            bgmSource.start(0);

            // 视觉
            await initFaceLandmarker();
            const camera = new Camera(videoElement, {
                onFrame: async () => {},
                width: 640, height: 480
            });
            await camera.start();
            startBtn.style.display = 'none';
            predict();
        } catch (e) {
            console.error(e);
            startBtn.innerText = "初始化失败，请检查摄像头权限";
            alert("错误提示: " + e.name + "\n请确保 GitHub 根目录有 face_landmarker.task 文件且手机已授权摄像头。");
        }
    };

    resize();
    animate();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>都成视觉 - 稳定交付版</title>
    
    <!-- 关键修改：使用你自己网站上的 vision_wasm_internal.js，不再依赖 CDN -->
    <script src="vision_wasm_internal.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        #input_video { position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
        #start_btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 18px 45px; font-size: 18px; background: #0ff; border: none;
            border-radius: 50px; color: #000; font-weight: bold; z-index: 10001;
            cursor: pointer; box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            transition: all 0.3s;
        }
        #footer_text {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: #fff; font-size: 24px; font-weight: 900; letter-spacing: 4px;
            pointer-events: none; text-align: center; z-index: 100;
        }
    </style>
</head>
<body>

<video id="input_video" playsinline webkit-playsinline muted></video>
<canvas id="canvas"></canvas>
<button id="start_btn">开启交互体验</button>
<div id="footer_text">都成视觉</div>

<script>
    /** --- 1. 全局配置与变量 --- **/
    let audioCtx, analyser, dataArray, bgmSource, audioBoost = 0;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('start_btn');
    const videoElement = document.getElementById('input_video');

    let width, height, particles = [];
    let dynamicFaceCoords = [];
    let faceLandmarker;

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        if (particles.length === 0) {
            for (let i = 0; i < 468; i++) {
                particles.push({
                    id: i, x: Math.random() * width, y: Math.random() * height,
                    size: Math.random() * 2 + 1
                });
            }
        }
    }
    window.addEventListener('resize', resize);

    /** --- 2. 核心初始化（全部改成本地路径） --- **/
    async function initFaceLandmarker() {
        try {
            console.log("开始加载 FilesetResolver...");
            if (typeof FilesetResolver === 'undefined' || typeof FaceLandmarker === 'undefined') {
                throw new Error("MediaPipe 库尚未加载完成，请检查 vision_wasm_internal.js 是否已正确放置在网页同目录下。");
            }

            // 指定本地 WASM 文件的路径（和当前页面同目录）
            const vision = await FilesetResolver.forVisionTasks(
                window.location.origin + window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/')) + "/"
            );
            
            console.log("准备加载模型（在线）...");

            // 仍然使用 Google 官方模型链接（这个不受影响，并且体积小）
            faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numFaces: 1
            });
            
            if (faceLandmarker && typeof faceLandmarker.detectForVideo === 'function') {
                console.log("✅ 识别引擎初始化成功！");
            } else {
                throw new Error("引擎已创建但 detectForVideo 方法丢失。");
            }
        } catch (err) {
            alert("🚨 初始化崩溃: " + err.message);
            console.error(err);
            throw err;
        }
    }

    async function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const res = await fetch('music.MP3');
        if (!res.ok) throw new Error("音频文件 music.MP3 加载失败。");
        const buffer = await audioCtx.decodeAudioData(await res.arrayBuffer());
        bgmSource = audioCtx.createBufferSource();
        bgmSource.buffer = buffer;
        bgmSource.loop = true;
        analyser = audioCtx.createAnalyser();
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        bgmSource.connect(analyser);
        analyser.connect(audioCtx.destination);
        bgmSource.start(0);
    }

    /** --- 3. 循环逻辑（未变） --- **/
    function animate() {
        if (analyser) {
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < 128; i++) sum += dataArray[i];
            audioBoost = sum / 128 / 255;
        }
        
        ctx.fillStyle = `rgba(0, 0, 0, 0.23)`;
        ctx.fillRect(0, 0, width, height);

        particles.forEach(p => {
            if (dynamicFaceCoords.length > 0) {
                const target = dynamicFaceCoords[p.id % dynamicFaceCoords.length];
                p.x += (target.x - p.x) * (0.08 + audioBoost * 0.12);
                p.y += (target.y - p.y) * (0.08 + audioBoost * 0.12);
            } else {
                p.x += Math.sin(Date.now() * 0.001 + p.id) * 0.4;
                p.y += Math.cos(Date.now() * 0.001 + p.id) * 0.4;
            }
            ctx.fillStyle = `hsla(${190 + audioBoost * 110}, 100%, 75%, 0.8)`;
            const s = p.size * (1 + audioBoost * 2.8);
            ctx.fillRect(p.x, p.y, s, s);
        });
        requestAnimationFrame(animate);
    }

    function predict() {
        if (faceLandmarker && videoElement.readyState >= 2) {
            try {
                const results = faceLandmarker.detectForVideo(videoElement, performance.now());
                if (results.faceLandmarks && results.faceLandmarks[0]) {
                    dynamicFaceCoords = results.faceLandmarks[0].map(m => ({
                        x: (1 - m.x) * width, y: m.y * height
                    }));
                }
            } catch (e) {
                console.error("帧处理失败:", e);
            }
        }
        requestAnimationFrame(predict);
    }

    /** --- 4. 启动按钮逻辑 --- **/
    startBtn.onclick = async () => {
        startBtn.innerText = "资源启动中...";
        startBtn.style.pointerEvents = "none";
        
        try {
            await initAudio();
            await initFaceLandmarker();
            
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 640, height: 480, facingMode: "user" } 
            });
            videoElement.srcObject = stream;
            videoElement.play();
            await new Promise(resolve => videoElement.onloadedmetadata = resolve);
            
            startBtn.style.display = 'none';
            predict();
        } catch (e) {
            console.error(e);
            startBtn.innerText = "点击重试";
            startBtn.style.pointerEvents = "all";
        }
    };

    resize();
    animate();
</script>
</body>
</html>

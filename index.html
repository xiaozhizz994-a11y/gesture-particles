<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>都成视觉 - 面部粒子交互</title>
    
    <script src="https://fastly.jsdelivr.net/npm/@mediapipe/face_landmarker/face_landmarker.js"></script>
    <script src="https://fastly.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
        canvas { display: block; }
        #input_video { position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0; }
        
        /* 启动按钮样式 */
        #start_btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 18px 45px; font-size: 18px; background: #0ff; border: none;
            border-radius: 50px; color: #000; font-weight: bold; z-index: 10001;
            cursor: pointer; box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            transition: all 0.3s;
        }
        #start_btn:active { transform: translate(-50%, -50%) scale(0.95); }

        /* 底部文字样式 */
        #footer_text {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: #ffffff; font-size: 24px; font-weight: 900; letter-spacing: 4px;
            pointer-events: none; text-align: center; z-index: 100;
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.6; text-shadow: 0 0 5px rgba(255, 255, 255, 0.3); }
            50% { opacity: 1; text-shadow: 0 0 20px rgba(255, 255, 255, 0.8); }
        }
    </style>
</head>
<body>

<video id="input_video" playsinline webkit-playsinline muted></video>
<canvas id="canvas"></canvas>
<button id="start_btn">开启交互体验</button>
<div id="footer_text">都成视觉</div>

<script>
    /** --- 1. 音频引擎 --- **/
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let analyser, dataArray, bgmSource;
    let audioBoost = 0;
    const sfxBuffers = [];

    async function loadAudioResources() {
        try {
            const bgmRes = await fetch('music.MP3');
            const bgmBuffer = await audioCtx.decodeAudioData(await bgmRes.arrayBuffer());
            bgmSource = audioCtx.createBufferSource();
            bgmSource.buffer = bgmBuffer;
            bgmSource.loop = true;
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            bgmSource.connect(analyser);
            analyser.connect(audioCtx.destination);
            bgmSource.start(0);
        } catch (e) { console.error("BGM加载失败", e); }

        for (let i = 0; i <= 4; i++) {
            try {
                const sfxRes = await fetch(`${i}.wav`);
                const buffer = await audioCtx.decodeAudioData(await sfxRes.arrayBuffer());
                sfxBuffers.push(buffer);
            } catch (e) { console.warn(`音效 ${i}.wav 加载失败`); }
        }
    }

    function playRandomSFX() {
        if (sfxBuffers.length === 0) return;
        const source = audioCtx.createBufferSource();
        source.buffer = sfxBuffers[Math.floor(Math.random() * sfxBuffers.length)];
        source.connect(analyser);
        source.connect(audioCtx.destination);
        source.start(0);
    }

    function updateAudioData() {
        if (!analyser) return;
        analyser.getByteFrequencyData(dataArray);
        let sum = 0;
        for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
        audioBoost = sum / dataArray.length / 255;
    }

    /** --- 2. 视觉粒子引擎 --- **/
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('start_btn');
    const videoElement = document.getElementById('input_video');

    let width, height, particles = [];
    let dynamicFaceCoords = []; // 用于存储动态生成的面部粒子目标位置

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        // 初始状态生成一些乱序粒子，防止开始时黑屏
        if (particles.length === 0) initParticles(468); // 468 是 MediaPipe 默认的面部关键点数量
    }
    window.addEventListener('resize', resize);

    function initParticles(count) {
        particles = [];
        for (let i = 0; i < count; i++) {
            particles.push(new Particle(i));
        }
    }

    class Particle {
        constructor(id) {
            this.id = id;
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            this.vx = 0; this.vy = 0;
            this.baseSize = Math.random() * 1.5 + 1.0;
            // 粒子颜色随节奏动态微调
            this.color = `hsla(${190 + Math.random() * 30}, 100%, 75%, ${Math.random() * 0.5 + 0.5})`;
        }

        update() {
            // 阻尼和节奏跳动动力
            this.x += this.vx; this.y += this.vy;
            this.vx *= 0.94; this.vy *= 0.94;

            // 只有当有动态面部数据时才汇聚成形状
            if (dynamicFaceCoords.length > 0) {
                // 将粒子均匀映射到动态关键点上
                const target = dynamicFaceCoords[this.id % dynamicFaceCoords.length];
                
                // 核心动力学：汇聚力随音频节奏跳动
                const speedFactor = 0.08 + audioBoost * 0.1;
                
                this.x += (target.x - this.x) * speedFactor;
                this.y += (target.y - this.y) * speedFactor;
            }
        }

        draw() {
            ctx.fillStyle = this.color;
            // 粒子大小随节奏跳动
            const s = this.baseSize * (1 + audioBoost * 3);
            ctx.fillRect(this.x, this.y, s, s);
        }
    }

    function animate() {
        updateAudioData();
        // 背景残留效果随节奏跳动，增强通感体验
        ctx.fillStyle = `rgba(0, 0, 0, ${0.16 - audioBoost * 0.08})`;
        ctx.fillRect(0, 0, width, height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }

    /** --- 3. 面部追踪与交互 --- **/
    let faceLandmarker;
    let runningMode = "IMAGE";

    // 初始化 Face Landmarker
    async function initFaceLandmarker() {
        const filesetResolver = await FilesetResolver.forVisionTasks(
            "https://fastly.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
        );
        faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
            baseOptions: {
                modelAssetPath: `https://fastly.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/face_landmarker.task`,
                delegate: "GPU"
            },
            outputFaceBlendshapes: false,
            runningMode: runningMode,
            numFaces: 1 // 只追踪一张脸以保证性能
        });
        runningMode = "VIDEO";
    }

    // 绘制并采样面部关键点
    function predictWebcam() {
        let startTimeMs = performance.now();
        if (runningMode === "IMAGE") {
            predictWebcam();
            return;
        }

        // 检测面部
        const results = faceLandmarker.detectForVideo(videoElement, startTimeMs);

        // 清空之前的目标位置
        dynamicFaceCoords = [];

        if (results.faceLandmarks && results.faceLandmarks.length > 0) {
            const marks = results.faceLandmarks[0];
            
            // 采样 MediaPipe 的 468 个默认面部关键点，并进行坐标系平滑处理
            dynamicFaceCoords = marks.map(m => ({
                x: (1 - m.x) * width, // 坐标镜像平滑，防止操作和现实反向
                y: m.y * height
            }));
        }

        if (runningMode === "VIDEO") {
            window.requestAnimationFrame(predictWebcam);
        }
    }

    const camera = new Camera(videoElement, {
        onFrame: async () => {}, // 关键改动：不需要每个 frame 都调用 detect，在主循环里调
        width: 640, height: 480
    });

    resize();
    animate();

    startBtn.onclick = async () => {
        startBtn.innerText = "资源唤醒中...";
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        await loadAudioResources();
        await initFaceLandmarker(); // 唤醒模型
        predictWebcam(); // 开启检测循环
        startBtn.style.display = 'none';
        camera.start();
    };
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>都成视觉 - 性能优化版</title>
    
    <script src="https://fastly.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm/vision_bundle.js"></script>
    <script src="https://fastly.jsdelivr.net/npm/@mediapipe/face_landmarker/face_landmarker.js"></script>
    <script src="https://fastly.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
        canvas { display: block; }
        #input_video { position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0; }
        
        #start_btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 18px 45px; font-size: 18px; background: #0ff; border: none;
            border-radius: 50px; color: #000; font-weight: bold; z-index: 10001;
            cursor: pointer; box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            transition: all 0.3s;
        }
        #start_btn:active { transform: translate(-50%, -50%) scale(0.95); }

        #footer_text {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: #ffffff; font-size: 24px; font-weight: 900; letter-spacing: 4px;
            pointer-events: none; text-align: center; z-index: 100;
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.6; text-shadow: 0 0 5px rgba(255, 255, 255, 0.3); }
            50% { opacity: 1; text-shadow: 0 0 20px rgba(255, 255, 255, 0.8); }
        }
    </style>
</head>
<body>

<video id="input_video" playsinline webkit-playsinline muted></video>
<canvas id="canvas"></canvas>
<button id="start_btn">开启交互体验</button>
<div id="footer_text">都成视觉</div>

<script>
    /** --- 1. 音频引擎 (针对 Safari 优化) --- **/
    let audioCtx;
    let analyser, dataArray, bgmSource;
    let audioBoost = 0;

    async function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        try {
            const bgmRes = await fetch('music.MP3');
            const bgmBuffer = await audioCtx.decodeAudioData(await bgmRes.arrayBuffer());
            bgmSource = audioCtx.createBufferSource();
            bgmSource.buffer = bgmBuffer;
            bgmSource.loop = true;
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            bgmSource.connect(analyser);
            analyser.connect(audioCtx.destination);
            bgmSource.start(0);
        } catch (e) { console.warn("音频初始化跳过"); }
    }

    function updateAudioData() {
        if (!analyser) return;
        analyser.getByteFrequencyData(dataArray);
        let sum = 0;
        for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
        audioBoost = sum / dataArray.length / 255;
    }

    /** --- 2. 视觉粒子引擎 --- **/
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('start_btn');
    const videoElement = document.getElementById('input_video');

    let width, height, particles = [];
    let dynamicFaceCoords = [];

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        if (particles.length === 0) initParticles(468);
    }
    window.addEventListener('resize', resize);

    class Particle {
        constructor(id) {
            this.id = id;
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            this.vx = (Math.random() - 0.5) * 2; 
            this.vy = (Math.random() - 0.5) * 2;
            this.baseSize = Math.random() * 1.5 + 1.2;
            this.color = `hsla(${190 + Math.random() * 30}, 100%, 75%, ${Math.random() * 0.5 + 0.5})`;
        }

        update() {
            this.x += this.vx; this.y += this.vy;
            this.vx *= 0.95; this.vy *= 0.95;

            if (dynamicFaceCoords.length > 0) {
                const target = dynamicFaceCoords[this.id % dynamicFaceCoords.length];
                const speedFactor = 0.07 + audioBoost * 0.12;
                this.x += (target.x - this.x) * speedFactor;
                this.y += (target.y - this.y) * speedFactor;
            }
        }

        draw() {
            // 重音时增加发光感
            if (audioBoost > 0.4) {
                ctx.shadowBlur = 10 * audioBoost;
                ctx.shadowColor = this.color;
            } else {
                ctx.shadowBlur = 0;
            }
            ctx.fillStyle = this.color;
            const s = this.baseSize * (1 + audioBoost * 2.5);
            ctx.fillRect(this.x, this.y, s, s);
        }
    }

    function initParticles(count) {
        particles = [];
        for (let i = 0; i < count; i++) particles.push(new Particle(i));
    }

    function animate() {
        updateAudioData();
        ctx.fillStyle = `rgba(0, 0, 0, ${0.18 - audioBoost * 0.08})`;
        ctx.fillRect(0, 0, width, height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }

    /** --- 3. 面部追踪与交互 --- **/
    let faceLandmarker;
    const { FaceLandmarker, FilesetResolver } = mediapipe;

    async function initFaceLandmarker() {
        const filesetResolver = await FilesetResolver.forVisionTasks(
            "https://fastly.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
        );
        faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
            baseOptions: {
                // 如果仍然极慢，请将此文件下载并改写为本地路径 'face_landmarker.task'
                modelAssetPath: `https://fastly.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/face_landmarker.task`,
                delegate: "GPU"
            },
            runningMode: "VIDEO",
            numFaces: 1
        });
    }

    function predictWebcam() {
        if (!faceLandmarker) return;
        let startTimeMs = performance.now();
        const results = faceLandmarker.detectForVideo(videoElement, startTimeMs);
        
        dynamicFaceCoords = [];
        if (results.faceLandmarks && results.faceLandmarks.length > 0) {
            const marks = results.faceLandmarks[0];
            dynamicFaceCoords = marks.map(m => ({
                x: (1 - m.x) * width,
                y: m.y * height
            }));
        }
        window.requestAnimationFrame(predictWebcam);
    }

    const camera = new Camera(videoElement, {
        onFrame: async () => {}, 
        width: 640, height: 480
    });

    resize();
    animate();

    startBtn.onclick = async () => {
        startBtn.innerText = "正在链接面部维度...";
        startBtn.style.pointerEvents = "none";
        
        // 瞬间激活音频
        await initAudio();
        if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();
        
        // 让粒子先动起来，不让用户觉得死机
        particles.forEach(p => {
            p.vx = (Math.random() - 0.5) * 30;
            p.vy = (Math.random() - 0.5) * 30;
        });

        try {
            await initFaceLandmarker();
            startBtn.style.display = 'none';
            camera.start();
            predictWebcam();
        } catch (e) {
            startBtn.innerText = "环境初始化失败，请重试";
            startBtn.style.pointerEvents = "all";
            console.error(e);
        }
    };
</script>

</body>
</html>
